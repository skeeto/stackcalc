name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check CMakeLists.txt PROJECT_VERSION matches tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BASE_VERSION=${VERSION%-rc*}
          CMAKE_VERSION=$(grep -Po 'project\(stackcalc VERSION \K[^ ]+' CMakeLists.txt)
          if [[ "$BASE_VERSION" != "$CMAKE_VERSION" ]]; then
            echo "::error::tag v$VERSION does not match CMakeLists.txt PROJECT_VERSION ($CMAKE_VERSION)"
            exit 1
          fi

  build-macos:
    needs: verify-version
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DSTACKCALC_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release -j

      - name: Package (DMG)
        run: cmake --build build --target package

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: stackcalc-macos
          path: build/stackcalc-*-macos-arm64.dmg
          if-no-files-found: error

  build-windows:
    needs: verify-version
    # Cross-compile from Linux with mingw-w64 — no Windows runner
    # needed. The macOS job already runs the test suite against the
    # same source; Windows-side we just verify it builds and link
    # the binary statically (no DLL dependencies beyond the system
    # Win32 libraries).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mingw-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Configure
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=cmake/mingw-w64-x86_64.cmake

      - name: Build
        run: cmake --build build -j

      - name: Upload unsigned exe
        uses: actions/upload-artifact@v4
        with:
          name: stackcalc-windows-exe
          path: build/bin/stackcalc.exe
          if-no-files-found: error

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write   # gh release create
      id-token: write   # aas-sign OIDC handshake
    steps:
      - uses: actions/checkout@v4   # for manual.md

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: stackcalc-macos
          path: dist

      - name: Download Windows exe
        uses: actions/download-artifact@v4
        with:
          name: stackcalc-windows-exe
          path: dist-windows

      - name: Sign stackcalc.exe
        uses: skeeto/aas-sign@v0.4.0
        with:
          endpoint:  ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          account:   ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
          profile:   ${{ secrets.CERTIFICATE_PROFILE }}
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          files: dist-windows/stackcalc.exe

      - name: Assemble Windows ZIP, rename for -rc tags
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BASE_VERSION=${VERSION%-rc*}

          # Zip the signed exe + manual.md at archive root.
          STAGE=$(mktemp -d)
          cp dist-windows/stackcalc.exe "$STAGE/"
          cp manual.md "$STAGE/"
          (cd "$STAGE" && zip -r "$GITHUB_WORKSPACE/dist/stackcalc-${BASE_VERSION}-windows-x64.zip" stackcalc.exe manual.md)

          # For -rc tags, rename both artifacts so user-facing download
          # filenames carry the full tag version. CPack only knows
          # PROJECT_VERSION (the base).
          if [[ "$VERSION" != "$BASE_VERSION" ]]; then
            mv "dist/stackcalc-${BASE_VERSION}-macos-arm64.dmg" \
               "dist/stackcalc-${VERSION}-macos-arm64.dmg"
            mv "dist/stackcalc-${BASE_VERSION}-windows-x64.zip" \
               "dist/stackcalc-${VERSION}-windows-x64.zip"
          fi
          ls -l dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Tags like vX.Y.Z-rcN are pipeline-test runs: publish as a
          # draft prerelease so they don't trigger release immutability
          # and can be deleted/retried freely.
          FLAGS=()
          if [[ "$VERSION" == *-rc* ]]; then
            FLAGS+=(--draft --prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$VERSION" \
            "${FLAGS[@]}" \
            "dist/stackcalc-${VERSION}-macos-arm64.dmg" \
            "dist/stackcalc-${VERSION}-windows-x64.zip"
